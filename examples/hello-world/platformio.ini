; PlatformIO Project Configuration File
;
; A minimal smoke test for the Meshtasticd WASM platform: compile a bare C
; program to WebAssembly with the emcc/em++ toolchain. Building it produces
; meshnode.{mjs,wasm} under .pio/build/wasm/ (an ES module; INVOKE_RUN=0, so the
; host calls main() — see the firmware's src/platform/portduino/wasm/ for the
; real node). Requires an Emscripten SDK on PATH (source emsdk_env.sh).
;
; https://docs.platformio.org/page/projectconf.html

[env:wasm]
platform = wasm
board = wasm
